 
<div class="login-page"> 

  <nav class="navbar"> 

    <h1 class="titulo">Sistema de intermediación laboral</h1> 

    <div class="nav-links"> 
      <a>Iniciar sesión</a> 
      <a (click)="irARegistro()">Registrarse</a> 
    </div> 
  </nav> 

  <div class="login-container">

  <!-- Logo centrado arriba del título -->
     <img src="assets/logoo.jpg" alt="Logo ITB" class="logo-nav" />
 
  
     <h2>Bienvenido/a</h2>
    
     <p class="subtitulo">Ingrese a su cuenta</p>
   

    <!-- Input email con ícono -->
    <div class="input-group">
      <span class="icono">👤</span>
      <input
        type="email"
        placeholder="Correo electrónico"
        [(ngModel)]="email"
      />
    </div>

    <!-- Campo contraseña con ojito -->
<!-- Campo contraseña con ojito -->
<div class="input-group">
  <span class="icono">🔒</span>
  <input
    [type]="mostrarPassword ? 'text' : 'password'"
    placeholder="Contraseña"
    [(ngModel)]="password"
  />
  <span class="ojito" (click)="togglePassword()">
    <!-- Ojito abierto: contraseña visible -->
    <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <!-- Ojito tachado: contraseña oculta -->
    <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  </span>
</div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button (click)="iniciarSesion()">Iniciar sesión</button>

    <p class="separador">¿No tenés cuenta? <a (click)="irARegistro()">Registrate</a></p>

  </div>
  

</div>
